<header class="header">
  <div class="header__container">
    <!-- Logo -->
    <a routerLink="/" class="header__logo">
      <span class="header__logo-icon">🛍️</span>
      <span class="header__logo-text">Inno<strong>Shop</strong></span>
    </a>

    <!-- Desktop Nav -->
    <nav class="header__nav" [class.header__nav--open]="isMenuOpen">
      <ul class="header__nav-list">
        <li>
          <a
            routerLink="/home"
            routerLinkActive="active"
            class="header__nav-link"
            >Home</a
          >
        </li>
        <li>
          <a
            routerLink="/catalog"
            routerLinkActive="active"
            class="header__nav-link"
            >Catalog</a
          >
        </li>
        <li>
          <a
            routerLink="/about"
            routerLinkActive="active"
            class="header__nav-link"
            >About</a
          >
        </li>
      </ul>
    </nav>

    <!-- Actions -->
    <div class="header__actions">
      <button class="header__btn header__btn--ghost">Login</button>
      <button class="header__btn header__btn--primary" routerLink="/register">Sign Up</button>
    </div>

    <!-- Burger -->
    <button
      class="header__burger"
      (click)="toggleMenu()"
      [class.header__burger--open]="isMenuOpen"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>
